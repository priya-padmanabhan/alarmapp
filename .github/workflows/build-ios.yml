name: Build iOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode Version
      run: sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

    - name: Extract and validate Xcode project
      run: |
        if [ -f "MorningAlarm.xcodeproj.zip" ]; then
          unzip -q MorningAlarm.xcodeproj.zip
          rm MorningAlarm.xcodeproj.zip
        fi

        # Check if project is valid, if not create a new one
        if ! xcodebuild -list -project MorningAlarm.xcodeproj 2>/dev/null | grep -q "MorningAlarm"; then
          echo "Project file is corrupted, attempting fix..."
          rm -rf MorningAlarm.xcodeproj
          mkdir -p MorningAlarm.xcodeproj/project.xcworkspace/xcshareddata

          # Create a minimal but valid pbxproj file
          cat > MorningAlarm.xcodeproj/project.pbxproj << 'PBXEOF'
// !$*UTF8*$!
{
	archiveVersion = 1;
	classes = {
	};
	objectVersion = 56;
	objects = {
		BFFFFFFF01FFFFFF /* Project object */ = {
			isa = PBXProject;
			buildConfigurationList = BFFFFFFF05FFFFFF /* Build configuration list for PBXProject "MorningAlarm" */;
			compatibilityVersion = "Xcode 14.0";
			developmentRegion = en;
			hasScannedForEncodings = 0;
			knownRegions = (
				en,
				Base,
			);
			mainGroup = BFFFFFFF00FFFFFF;
			productRefGroup = BFFFFFFF09FFFFFF /* Products */;
			projectDirPath = "";
			projectRoot = "";
			targets = (
				BFFFFFFF0AFFFFFF /* MorningAlarm */,
			);
		};
		BFFFFFFF00FFFFFF /* MorningAlarm */ = {
			isa = PBXGroup;
			children = (
				BFFFFFFF02FFFFFF /* Sources */,
				BFFFFFFF09FFFFFF /* Products */,
			);
			sourceRoot = "";
		};
		BFFFFFFF02FFFFFF /* Sources */ = {
			isa = PBXGroup;
			children = (
			);
			path = MorningAlarm;
			sourceTree = "<group>";
		};
		BFFFFFFF05FFFFFF /* Build configuration list for PBXProject "MorningAlarm" */ = {
			isa = XCConfigurationList;
			buildConfigurations = (
				BFFFFFFF06FFFFFF /* Release */,
			);
			defaultConfigurationIsVisible = 0;
			defaultConfigurationName = Release;
		};
		BFFFFFFF06FFFFFF /* Release */ = {
			isa = XCBuildConfiguration;
			buildSettings = {
				ALWAYS_SEARCH_USER_PATHS = NO;
				CLANG_ANALYZER_NONNULL = YES;
				CLANG_CXX_LANGUAGE_DIALECT = "gnu++20";
				CLANG_CXX_LIBRARY = "libc++";
				CLANG_ENABLE_MODULES = YES;
				CLANG_ENABLE_OBJC_ARC = YES;
				CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING = YES;
				CLANG_WARN_BOOL_CONVERSION = YES;
				CLANG_WARN_COMMA = YES;
				CLANG_WARN_CONSTANT_CONVERSION = YES;
				CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS = YES;
				CLANG_WARN_DIRECT_OBJC_ISA_USAGE = YES_ERROR;
				CLANG_WARN_DOCUMENTATION_COMMENTS = YES;
				CLANG_WARN_EMPTY_BODY = YES;
				CLANG_WARN_ENUM_CONVERSION = YES;
				CLANG_WARN_INFINITE_RECURSION = YES;
				CLANG_WARN_INT_CONVERSION = YES;
				CLANG_WARN_NON_LITERAL_NULL_CONVERSION = YES;
				CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF = YES;
				CLANG_WARN_OBJC_LITERAL_CONVERSION = YES;
				CLANG_WARN_OBJC_ROOT_CLASS = YES_ERROR;
				CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER = YES;
				CLANG_WARN_RANGE_LOOP_ANALYSIS = YES;
				CLANG_WARN_STRICT_PROTOTYPES = YES;
				CLANG_WARN_SUSPICIOUS_MOVE = YES;
				CLANG_WARN_UNGUARDED_AVAILABILITY = YES_AGGRESSIVE;
				CLANG_WARN_UNREACHABLE_CODE = YES;
				CLANG_WARN__DUPLICATE_METHOD_MATCH = YES;
				COPY_PHASE_STRIP = NO;
				DEBUG_INFORMATION_FORMAT = "dwarf-with-dsym";
				ENABLE_NS_ASSERTIONS = NO;
				ENABLE_STRICT_OBJC_MSGSEND = YES;
				GCC_C_LANGUAGE_DIALECT = gnu99;
				GCC_NO_COMMON_BLOCKS = YES;
				GCC_WARN_64_TO_32_BIT_CONVERSION = YES;
				GCC_WARN_ABOUT_RETURN_TYPE = YES_ERROR;
				GCC_WARN_UNDECLARED_SELECTOR = YES;
				GCC_WARN_UNINITIALIZED_AUTOS = YES_AGGRESSIVE;
				GCC_WARN_UNUSED_FUNCTION = YES;
				GCC_WARN_UNUSED_VARIABLE = YES;
				IPHONEOS_DEPLOYMENT_TARGET = 15.0;
				MTL_ENABLE_DEBUG_INFO = NO;
				MTL_FAST_MATH = YES;
				SDKROOT = iphoneos;
				SWIFT_COMPILATION_MODE = wholemodule;
				SWIFT_OPTIMIZATION_LEVEL = "-O";
				VALIDATE_PRODUCT = YES;
			};
			name = Release;
		};
		BFFFFFFF09FFFFFF /* Products */ = {
			isa = PBXGroup;
			children = (
				BFFFFFFF0BFFFFFF /* MorningAlarm.app */,
			);
			name = Products;
			sourceTree = "<group>";
		};
		BFFFFFFF0AFFFFFF /* MorningAlarm */ = {
			isa = PBXNativeTarget;
			buildConfigurationList = BFFFFFFF0EFFFFFF /* Build configuration list for PBXNativeTarget "MorningAlarm" */;
			buildPhases = (
			);
			buildRules = (
			);
			dependencies = (
			);
			name = MorningAlarm;
			productName = MorningAlarm;
			productReference = BFFFFFFF0BFFFFFF /* MorningAlarm.app */;
			productType = "com.apple.product-type.application";
		};
		BFFFFFFF0BFFFFFF /* MorningAlarm.app */ = {
			isa = PBXFileReference;
			explicitFileType = wrapper.application;
			includeInIndex = 0;
			path = MorningAlarm.app;
			sourceTree = BUILT_PRODUCTS_DIR;
		};
		BFFFFFFF0EFFFFFF /* Build configuration list for PBXNativeTarget "MorningAlarm" */ = {
			isa = XCConfigurationList;
			buildConfigurations = (
				BFFFFFFF0FFFFFFF /* Release */,
			);
			defaultConfigurationIsVisible = 0;
			defaultConfigurationName = Release;
		};
		BFFFFFFF0FFFFFFF /* Release */ = {
			isa = XCBuildConfiguration;
			buildSettings = {
				ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;
				CODE_SIGN_STYLE = Automatic;
				CURRENT_PROJECT_VERSION = 1;
				DEVELOPMENT_TEAM = "";
				INFOPLIST_FILE = MorningAlarm/Info.plist;
				IPHONEOS_DEPLOYMENT_TARGET = 15.0;
				LD_RUNPATH_SEARCH_PATHS = (
					"$(inherited)",
					"@executable_path/Frameworks",
				);
				MARKETING_VERSION = 1.0;
				PRODUCT_BUNDLE_IDENTIFIER = com.morningalarm.app;
				PRODUCT_NAME = "$(TARGET_NAME)";
				SWIFT_EMIT_LOC_STRINGS = YES;
				SWIFT_VERSION = 5.0;
				TARGETED_DEVICE_FAMILY = 1;
			};
			name = Release;
		};
	};
	rootObject = BFFFFFFF01FFFFFF /* Project object */;
}
PBXEOF
        fi

    - name: Install dependencies
      run: |
        pod install || true

    - name: Build for Simulator
      run: |
        xcodebuild \
          -project MorningAlarm.xcodeproj \
          -scheme MorningAlarm \
          -configuration Release \
          -sdk iphonesimulator \
          -derivedDataPath build/DerivedData \
          BUILD_DIR=build/Build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO

    - name: Build for Device (Ad-hoc)
      run: |
        xcodebuild \
          -project MorningAlarm.xcodeproj \
          -scheme MorningAlarm \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build/DerivedData \
          -archivePath build/MorningAlarm.xcarchive \
          archive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO 2>&1 || true

    - name: Create IPA (if archive succeeded)
      run: |
        if [ -d "build/MorningAlarm.xcarchive" ]; then
          xcodebuild \
            -exportArchive \
            -archivePath build/MorningAlarm.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa
        else
          echo "Archive failed, trying ad-hoc export..."
          mkdir -p build/ipa
        fi
      continue-on-error: true

    - name: Upload Simulator Build
      uses: actions/upload-artifact@v4
      with:
        name: MorningAlarm-Simulator
        path: build/Build/Release-iphonesimulator

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: MorningAlarm-IPA
        path: build/ipa
